name: Actualizar Datos Diarios

on:
  schedule:
    # Se ejecuta de Lunes a Viernes a las 21:00 UTC (18:00 hs de Argentina)
    - cron: '0 21 * * 1-5'
  workflow_dispatch: # Esto te agrega un botón para correrlo a mano cuando quieras

permissions:
  contents: write # Esto es VITAL para que el bot pueda guardar los JSON en tu repo

jobs:
  actualizar-jsons:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar el repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar librerías
        run: |
          python -m pip install --upgrade pip
          pip install requests yfinance urllib3

      - name: ⚙️ Ejecutar scripts de extracción
        run: |
          python fetch_bcra.py
          python fetch_mercado.py

      - name: 💾 Guardar y subir los cambios a GitHub
        run: |
          git config --global user.name "Bot del Monitor Económico"
          git config --global user.email "bot@monitoreconomico.ar"
          git add bcra_data.json mercado_data.json
          git commit -m "Actualización automática de datos diarios" || echo "No hay cambios para subir"
          git push